<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cubo 3D</title>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(2,2,3);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);


const geometry = new THREE.BoxGeometry();

const material = [
new THREE.MeshBasicMaterial({color:0xff0000}), // direita
new THREE.MeshBasicMaterial({color:0x00ff00}), // esquerda
new THREE.MeshBasicMaterial({color:0x0000ff}), // topo
new THREE.MeshBasicMaterial({color:0xffff00}), // baixo
new THREE.MeshBasicMaterial({color:0xff00ff}), // frente
new THREE.MeshBasicMaterial({color:0x00ffff})  // trás
];;

const cube = new THREE.Mesh(geometry,material);
scene.add(cube);

const controls = new THREE.OrbitControls(camera,renderer.domElement);

controls.enableDamping = true;

window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
